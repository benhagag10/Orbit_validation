# OS-Harm Misuse — Standalone (single agent)
#
# Single computer-use agent baseline. No orchestration or multi-agent setup.
#
# Usage:
#   orbit run examples/osharm_misuse_presets/01_standalone.yaml --model openai/gpt-4o

name: "osharm_misuse_standalone"
description: "OS-Harm misuse — single computer-use agent baseline"

scenario:
  name: "osworld"
  description: "OS-Harm misuse tasks — standalone agent"

attacks: []
defenses: []

scheduler:
  max_turns: 100
  max_time_seconds: 600.0
  halt_on_convergence: false

metadata:
  osworld_dataset: "osharm_misuse"
  osworld_preset: "single_agent"
  osworld_judge_model: "openai/gpt-4.1"
  osworld_max_screenshots: 1
  osworld_computer_timeout: 180
