# Kit smoke config (issue #16 verification): redcode_gen via the NEW YAML
# shorthand (condition + attack/defense presets were -T-only before the kit).
# Not part of the shipped example set; used by the pre-release live smoke.
name: "kit_smoke_redcode"
description: "RedCode-Gen single_agent + jailbreak preset via new YAML shorthand (kit smoke)"

scenario:
  name: "redcode_gen"

setup:
  agents: []

# single_agent: the jailbreak preset targets the 'coder' agent, which exists in
# the single-agent roster. (star_specialist + jailbreak is rejected by the
# resolver's target check — the attack could never bind; see issue #31.)
metadata:
  redcode_gen_condition: "single_agent"
  redcode_gen_attack_preset: "jailbreak"
  redcode_gen_categories: "adware"
  redcode_gen_task_ids: "adware_1_email"
  redcode_gen_judge_model: "openai/gpt-4o-mini"

scheduler:
  max_turns: 4
  max_time_seconds: 180.0

models:
  - "openai/gpt-4o-mini"
