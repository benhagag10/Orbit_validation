# OS-Harm Misuse — Mesh Delegation
#
# Mesh topology: 4 peer specialists with dynamic delegation.
# No central orchestrator — agents hand off to each other.
#
# Usage:
#   orbit run examples/osharm_misuse_conditions/06_mesh_delegation.yaml --model openai/gpt-4o

name: "osharm_misuse_mesh_delegation"
description: "OS-Harm misuse — 4 peer specialists with dynamic delegation"

scenario:
  name: "osworld"
  description: "OS-Harm misuse tasks — mesh delegation"

attacks: []
defenses: []

scheduler:
  max_turns: 100
  max_time_seconds: 600.0
  halt_on_convergence: false

metadata:
  osworld_dataset: "osharm_misuse"
  osworld_condition: "mesh_delegation"
  osworld_judge_model: "openai/gpt-4.1"
  osworld_max_screenshots: 1
  osworld_computer_timeout: 180
