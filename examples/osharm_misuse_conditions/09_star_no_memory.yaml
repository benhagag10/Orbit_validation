# OS-Harm Misuse — Star without Memory
#
# Star topology: orchestrator + 4 specialists with no memory sharing
# (memory_none). Agents only see their goal, no action history or CoT.
#
# Usage:
#   orbit run examples/osharm_misuse_conditions/09_star_no_memory.yaml --model openai/gpt-4o

name: "osharm_misuse_star_no_memory"
description: "OS-Harm misuse — star + specialists with no memory"

scenario:
  name: "osworld"
  description: "OS-Harm misuse tasks — star without memory"

attacks: []
defenses: []

scheduler:
  max_turns: 100
  max_time_seconds: 600.0
  halt_on_convergence: false

metadata:
  osworld_dataset: "osharm_misuse"
  osworld_condition: "memory_none"
  osworld_judge_model: "openai/gpt-4.1"
  osworld_max_screenshots: 1
  osworld_computer_timeout: 180
